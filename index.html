<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testors On Tour 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP -->
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17l4-8 4 4 3-6 4 10"/>
          <path d="M3 20h18"/>
        </svg>
        <span class="header-title">Testors On Tour</span>
        <span class="header-year">2026</span>
      </div>
      <nav class="header-nav">
        <a class="header-link" href="https://www.almenrausch.at/touren/detail/durch-das-wilde-karwendel-4-tagesetappen/" target="_blank" rel="noopener noreferrer">Almenrausch ↗</a>
        <span class="header-nav-sep"></span>
        <span>Karwendel</span>
        <span>1 – 5 Juli</span>
      </nav>
    </div>
  </header>

<!-- MIDDLE -->
  <div class="middle">

    <!-- MAIN LEFT -->
    <div class="main-left">
      <div id="tourList"></div>
    </div>

    <!-- MAIN RIGHT -->
    <div class="main-right" id="detailPanel">
      <div class="detail-content visible is-default" id="detailContent">
        <div class="default-header">Vier Tage durch den Karwendel marschieren</div>
        <div id="detailImageWrap">
          <img class="detail-image" src="Data/images/Karwendel.jpg" alt="Karwendel" />
        </div>
        <div class="default-footer">
          Orginal Idee:
          <a href="https://www.almenrausch.at/touren/detail/durch-das-wilde-karwendel-4-tagesetappen/" target="_blank" rel="noopener noreferrer">almenrausch.at ↗</a>
        </div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-bottom-section">
          <div class="detail-bottom-left">
            <div class="detail-date" id="detailDate"></div>
            <div id="detailLinkWrap"></div>
          </div>
          <div class="detail-side-text" id="detailSideText"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- HIKERS + FOOTER -->
  <div class="bottom-section">
    <div class="hikers-row">
      <span class="hiker-name" style="color:#0f766e; transform: rotate(-8deg); margin-top: 18px;">Sylvia</span>
      <span class="hiker-name" style="color:#2980b9; transform: rotate(5deg); margin-top: 4px;">Mike</span>
      <span class="hiker-name" style="color:#8e44ad; transform: rotate(-12deg); margin-top: 24px;">Peter</span>
      <span class="hiker-name" style="color:#c0392b; transform: rotate(9deg); margin-top: 8px;">Rini</span>
      <span class="hiker-name" style="color:#d35400; transform: rotate(-6deg); margin-top: 20px;">Marijke</span>
    </div>
    <footer>
      <p>&copy; 2026 Testoren GmbH</p>
    </footer>
  </div>

  <script src="app.js"></script>

</body>
</html>
